name: kkuser_ios
description: "A new Flutter project for iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ဒေတာဘေ့စ်၊ အသံနှင့် စနစ်သုံး Packages များ
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  audioplayers: ^6.0.0
  flutter_inappwebview: ^6.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/web/